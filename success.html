<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Message Sent | Diviti Developments</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(184, 115, 74, 0.16), transparent 30rem),
        linear-gradient(180deg, #05070c, #0b1623);
      color: #f6f6f4;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }

    div {
      max-width: 560px;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      margin-bottom: 18px;
    }

    p {
      color: #9aa6b8;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      margin-top: 26px;
      padding: 14px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, #e0a15f, #b8734a, #70411f);
      color: #090805;
      text-decoration: none;
      font-weight: 850;
    }
  </style>
</head>

<body>
  <div>
    <h1>Request sent.</h1>
    <p>Thanks for getting in touch. We’ll review your details and come back with the next step.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
