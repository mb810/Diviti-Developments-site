<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Request Sent | Diviti Developments</title>
  <meta name="description" content="Your website preview request has been sent to Diviti Developments." />

  <style>
    :root {
      --bg: #05070c;
      --bg-soft: #0b1623;
      --text: #f6f6f4;
      --muted: #9aa6b8;
      --accent: #b8734a;
      --accent-light: #e0a15f;
      --accent-dark: #70411f;
      --line: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(184, 115, 74, 0.18), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(47, 128, 237, 0.08), transparent 28rem),
        linear-gradient(180deg, var(--bg), var(--bg-soft));
      color: var(--text);
      text-align: center;
    }

    .card {
      width: min(620px, 100%);
      padding: 44px;
      border-radius: 32px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top, rgba(184, 115, 74, 0.14), transparent 22rem),
        rgba(255, 255, 255, 0.045);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 26px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent-light), var(--accent), var(--accent-dark));
      color: #090805;
      font-weight: 950;
      font-size: 1.4rem;
      box-shadow: 0 18px 45px rgba(184, 115, 74, 0.25);
    }

    h1 {
      font-size: clamp(2.7rem, 7vw, 5.2rem);
      line-height: 0.95;
      letter-spacing: -0.065em;
      margin-bottom: 18px;
    }

    p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.65;
      max-width: 460px;
      margin: 0 auto;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 30px;
      padding: 0 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent), var(--accent-dark));
      color: #090805;
      text-decoration: none;
      font-weight: 850;
      transition: transform 220ms ease;
    }

    a:hover {
      transform: translateY(-2px);
    }

    .small {
      margin-top: 18px;
      font-size: 0.9rem;
      color: rgba(154, 166, 184, 0.78);
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="mark">D</div>
    <h1>Request sent.</h1>
    <p>
      Thanks for getting in touch. We’ll review your details and come back with the next step.
    </p>
    <a href="/">Back to home</a>
    <p class="small">Diviti Developments Limited</p>
  </main>
</body>
</html>
